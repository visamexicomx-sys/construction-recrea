<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=https://construction-recrea.com/zh/">
<link rel="canonical" href="https://construction-recrea.com/zh/">
<title>Redirecting...</title>
</head>
<body>
<p>Página movida. <a href="https://construction-recrea.com/zh/">Haz clic aquí</a> si no eres redirigido.</p>
<!-- WhatsApp Smart Widget -->
<div class="wa-widget" id="waWidget">
  <div class="wa-chat-box" id="waChatBox">
    <div class="wa-chat-header">
      <div class="wa-avatar"><i class="bi bi-headset"></i></div>
      <div>
        <div class="wa-chat-name">Recrea 建筑</div>
        <div class="wa-chat-status"><span class="wa-online-dot"></span> 在线 — 30分钟内回复</div>
      </div>
      <button class="wa-close" id="waClose" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="wa-chat-body">
      <div class="wa-message"><span>您好！我们如何帮助您的建筑项目？</span></div>
    </div>
    <div class="wa-quick-btns">
      <a href="https://wa.me/529844525333?text=你好!%20新建工程" target="_blank" rel="noopener" class="wa-quick-btn">新建工程</a>
      <a href="https://wa.me/529844525333?text=你好!%20翻新装修" target="_blank" rel="noopener" class="wa-quick-btn">翻新装修</a>
      <a href="https://wa.me/529844525333?text=你好!%20免费报价" target="_blank" rel="noopener" class="wa-quick-btn">免费报价</a>
      <a href="https://wa.me/529844525333?text=你好!%20我有一个问题" target="_blank" rel="noopener" class="wa-quick-btn wa-quick-btn-main"><i class="bi bi-whatsapp me-1"></i>开始聊天</a>
    </div>
  </div>
  <button class="whatsapp-float" id="waToggle" aria-label="WhatsApp"><i class="bi bi-whatsapp" id="waIcon"></i></button>
</div>
<script>(function(){var t=document.getElementById('waToggle'),b=document.getElementById('waChatBox'),c=document.getElementById('waClose'),i=document.getElementById('waIcon');if(!t||!b)return;t.addEventListener('click',function(){var o=b.classList.toggle('wa-show');t.classList.toggle('wa-open',o);if(i)i.className=o?'bi bi-x-lg':'bi bi-whatsapp';});if(c)c.addEventListener('click',function(){b.classList.remove('wa-show');t.classList.remove('wa-open');if(i)i.className='bi bi-whatsapp';});document.addEventListener('click',function(e){if(!document.getElementById('waWidget').contains(e.target)){b.classList.remove('wa-show');t.classList.remove('wa-open');if(i)i.className='bi bi-whatsapp';}});})();</script>
</body>
</html>
