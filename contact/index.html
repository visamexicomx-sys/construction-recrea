<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=https://construction-recrea.com/#contact">
<link rel="canonical" href="https://construction-recrea.com/#contact">
<title>Redirecting...</title>
</head>
<body>
<p>Página movida. <a href="https://construction-recrea.com/#contact">Haz clic aquí</a> si no eres redirigido.</p>
<!-- WhatsApp Smart Widget -->
<div class="wa-widget" id="waWidget">
  <div class="wa-chat-box" id="waChatBox">
    <div class="wa-chat-header">
      <div class="wa-avatar"><i class="bi bi-headset"></i></div>
      <div>
        <div class="wa-chat-name">Recrea Construcción</div>
        <div class="wa-chat-status"><span class="wa-online-dot"></span> En línea — respuesta en &lt;30 min</div>
      </div>
      <button class="wa-close" id="waClose" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="wa-chat-body">
      <div class="wa-message"><span>¡Hola! ¿Cómo podemos ayudarte con tu proyecto? Elige una opción o escríbenos.</span></div>
    </div>
    <div class="wa-quick-btns">
      <a href="https://wa.me/529844525333?text=Hola!%20Construcción%20nueva" target="_blank" rel="noopener" class="wa-quick-btn">Construcción Nueva</a>
      <a href="https://wa.me/529844525333?text=Hola!%20Remodelación" target="_blank" rel="noopener" class="wa-quick-btn">Remodelación</a>
      <a href="https://wa.me/529844525333?text=Hola!%20Cotización%20gratuita" target="_blank" rel="noopener" class="wa-quick-btn">Cotización</a>
      <a href="https://wa.me/529844525333?text=Hola!%20Tengo%20una%20consulta" target="_blank" rel="noopener" class="wa-quick-btn wa-quick-btn-main"><i class="bi bi-whatsapp me-1"></i>Iniciar Chat</a>
    </div>
  </div>
  <button class="whatsapp-float" id="waToggle" aria-label="WhatsApp"><i class="bi bi-whatsapp" id="waIcon"></i></button>
</div>
<script>(function(){var t=document.getElementById('waToggle'),b=document.getElementById('waChatBox'),c=document.getElementById('waClose'),i=document.getElementById('waIcon');if(!t||!b)return;var open=false;t.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();open=!open;b.classList.toggle('open',open);if(i)i.className=open?'bi bi-x-lg':'bi bi-whatsapp';});if(c)c.addEventListener('click',function(e){e.stopPropagation();open=false;b.classList.remove('open');if(i)i.className='bi bi-whatsapp';});document.addEventListener('click',function(e){if(open&&!e.target.closest('#waWidget')){open=false;b.classList.remove('open');if(i)i.className='bi bi-whatsapp';}});})();</script>
</body>
</html>
